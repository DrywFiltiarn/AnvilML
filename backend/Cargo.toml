[package]
name = "backend"
version = "0.1.11"
edition = "2021"

[[bin]]
name = "anvilml"
path = "src/main.rs"

[dependencies]
anvilml-core = { path = "../crates/anvilml-core" }
anvilml-ipc = { path = "../crates/anvilml-ipc" }
anvilml-hardware = { path = "../crates/anvilml-hardware" }
anvilml-registry = { path = "../crates/anvilml-registry" }
anvilml-scheduler = { path = "../crates/anvilml-scheduler" }
anvilml-server = { path = "../crates/anvilml-server" }
anvilml-worker = { path = "../crates/anvilml-worker" }
chrono = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
mock-hardware = ["anvilml-server/mock-hardware", "anvilml-hardware/mock-hardware"]

[dev-dependencies]
anvilml-ipc = { path = "../crates/anvilml-ipc" }
anvilml-worker = { path = "../crates/anvilml-worker" }
async-trait = "0.1"
bytes = { workspace = true }
futures-util = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
temp-env = { version = "0.3", features = ["async_closure"] }
tempfile = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
toml = { workspace = true }
tower = { workspace = true }
uuid = { workspace = true }
