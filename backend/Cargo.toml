[package]
name = "backend"
version.workspace = true
edition = "2021"

[[bin]]
name = "anvilml"
path = "src/main.rs"

[dependencies]
anvilml-core = { path = "../crates/anvilml-core" }
anvilml-hardware = { path = "../crates/anvilml-hardware" }
anvilml-registry = { path = "../crates/anvilml-registry" }
anvilml-server = { path = "../crates/anvilml-server" }
anvilml-worker = { path = "../crates/anvilml-worker" }
clap = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
mock-hardware = ["anvilml-server/mock-hardware", "anvilml-hardware/mock-hardware"]

[dev-dependencies]
toml = { workspace = true }
