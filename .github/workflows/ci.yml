name: CI AnvilML v3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            fmt: true
          - os: windows-latest
            fmt: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Format check
        if: matrix.fmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --features mock-hardware -- -D warnings
      - name: Test
        run: cargo test --workspace --features mock-hardware

  worker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            activate: . .venv/bin/activate
          - os: windows-latest
            activate: .venv/Scripts/activate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m venv .venv
          ${{ matrix.activate }}
          pip install pytest pyzmq msgpack
      - name: Run worker tests
        env:
          ANVILML_WORKER_MOCK: "1"
        run: |
          ${{ matrix.activate }}
          python -m pytest worker/tests -v

  openapi-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [rust]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Regenerate openapi.json
        run: cargo run -p anvilml-openapi
      - name: Check for drift
        run: git diff --exit-code backend/openapi.json

  config-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [rust]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Config surface sync
        run: cargo test -p backend --features mock-hardware -- config_reference