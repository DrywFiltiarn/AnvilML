name: rust-test

on: [push, pull_request]

jobs:
  rust-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Check formatting (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy check
        run: cargo clippy --workspace --features mock-hardware -- -D warnings

      - name: Run tests
        run: cargo test --workspace --features mock-hardware

  worker-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            mode: mock
          - os: ubuntu-latest
            mode: real
          - os: windows-latest
            mode: mock
          - os: windows-latest
            mode: real
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run worker tests
        run: |
          echo "worker tests: no worker/ source yet (mode=${{ matrix.mode }})"

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check openapi drift
        run: echo "no openapi/config yet"

  config-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check config drift
        run: echo "no openapi/config yet"
