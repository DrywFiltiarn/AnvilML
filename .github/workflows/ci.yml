name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain_components: rustfmt, clippy
            check_fmt: true
            python_cmd: python3
            venv_pip: .ci-venv/bin/pip
          - os: windows-latest
            toolchain_components: clippy
            check_fmt: false
            python_cmd: python
            venv_pip: .ci-venv\Scripts\pip

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: ${{ matrix.toolchain_components }}
          cache: true

      - name: Check formatting
        if: matrix.check_fmt
        run: cargo fmt --all --check

      - name: Mock-hardware lint
        run: cargo clippy --workspace --features mock-hardware -- -D warnings

      - name: Real-hardware lint
        run: cargo clippy --bin anvilml -- -D warnings

      - name: Setup Python for worker tests
        run: ${{ matrix.python_cmd }} -m venv .ci-venv && ${{ matrix.venv_pip }} install msgpack pillow

      - name: Run tests
        run: cargo test --workspace --features mock-hardware
        env:
          ANVILML_VENV_PATH: .ci-venv
          ANVILML_WORKER_MOCK: "1"

      - name: Mock-hardware compile check
        run: cargo check --bin anvilml --features mock-hardware

      - name: Real-hardware compile check
        run: cargo check --bin anvilml

  python-worker:
    name: Python worker (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install msgpack pillow pytest

      - name: Run worker tests (mock mode)
        run: python -m pytest worker/tests/ -v
        env:
          ANVILML_WORKER_MOCK: "1"