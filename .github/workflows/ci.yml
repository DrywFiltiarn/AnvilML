name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            target/
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy lint
        run: cargo clippy --workspace --features mock-hardware -- -D warnings

      - name: Run tests
        run: cargo test --workspace --features mock-hardware

  python-worker:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install -r worker/requirements/base.txt

      - name: Run tests
        env:
          ANVILML_WORKER_MOCK: "1"
        run: python -m pytest worker/tests/ -v

  openapi-diff:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            target/
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Regenerate OpenAPI spec
        run: cargo run -p anvilml-openapi -- --output backend/openapi.json

      - name: Diff against committed spec
        run: git diff --exit-code backend/openapi.json

  rust-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            target/
          key: cargo-Windows-${{ hashFiles('Cargo.lock') }}-windows

      - name: Clippy lint
        run: cargo clippy --workspace --features mock-hardware -- -D warnings

      - name: Run tests
        run: cargo test --workspace --features mock-hardware
