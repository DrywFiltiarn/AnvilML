name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: true

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Mock-hardware lint
        run: cargo clippy --workspace --features mock-hardware -- -D warnings

      - name: Real-hardware lint
        run: cargo clippy --bin anvilml -- -D warnings

      - name: Run tests
        run: cargo test --workspace --features mock-hardware

      - name: Mock-hardware compile check
        run: cargo check --bin anvilml --features mock-hardware

      - name: Real-hardware compile check
        run: cargo check --bin anvilml

  rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: true

      - name: Mock-hardware lint
        run: cargo clippy --workspace --features mock-hardware -- -D warnings


      - name: Real-hardware lint
        run: cargo clippy --bin anvilml -- -D warnings

      - name: Run tests
        run: cargo test --workspace --features mock-hardware

      - name: Mock-hardware compile check
        run: cargo check --bin anvilml --features mock-hardware

      - name: Real-hardware compile check
        run: cargo check --bin anvilml
