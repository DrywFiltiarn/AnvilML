name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: true

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Mock-hardware lint
        run: cargo clippy --workspace --features mock-hardware -- -D warnings

      - name: Real-hardware lint
        run: cargo clippy --bin anvilml -- -D warnings

      - name: Setup Python for worker tests
        run: python3 -m venv .ci-venv && .ci-venv/bin/pip install msgpack pillow

      - name: Run tests
        run: cargo test --workspace --features mock-hardware
        env:
          ANVILML_VENV_PATH: .ci-venv
          ANVILML_WORKER_MOCK: "1"

      - name: Mock-hardware compile check
        run: cargo check --bin anvilml --features mock-hardware

      - name: Real-hardware compile check
        run: cargo check --bin anvilml

  rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: true

      - name: Mock-hardware lint
        run: cargo clippy --workspace --features mock-hardware -- -D warnings


      - name: Real-hardware lint
        run: cargo clippy --bin anvilml -- -D warnings

      - name: Setup Python for worker tests
        run: python -m venv .ci-venv && .ci-venv\Scripts\pip install msgpack pillow

      - name: Run tests
        run: cargo test --workspace --features mock-hardware
        env:
          ANVILML_VENV_PATH: .ci-venv
          ANVILML_WORKER_MOCK: "1"

      - name: Mock-hardware compile check
        run: cargo check --bin anvilml --features mock-hardware

      - name: Real-hardware compile check
        run: cargo check --bin anvilml

  python-worker:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install msgpack pillow pytest

      - name: Run worker tests (mock mode)
        run: ANVILML_WORKER_MOCK=1 python -m pytest worker/tests/ -v
