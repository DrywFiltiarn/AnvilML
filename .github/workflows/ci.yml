name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  rust-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --features mock-hardware -- -D warnings
      - name: Test
        run: cargo test --workspace --features mock-hardware

  rust-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Clippy
        run: cargo clippy --workspace --features mock-hardware -- -D warnings
      - name: Test
        run: cargo test --workspace --features mock-hardware

  worker-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install pytest pyzmq msgpack
      - name: Run worker tests
        run: |
          . .venv/bin/activate
          ANVILML_WORKER_MOCK=1 python -m pytest worker/tests/ -v

  worker-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install pytest pyzmq msgpack
      - name: Run worker tests
        run: |
          .venv\Scripts\activate
          ANVILML_WORKER_MOCK=1 python -m pytest worker/tests/ -v

  openapi-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [rust-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate openapi.json
        run: cargo run -p anvilml-openapi
      - name: Check for drift
        run: git diff --exit-code backend/openapi.json

  config-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [rust-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Config surface sync
        run: cargo test -p backend --features mock-hardware -- config_reference
