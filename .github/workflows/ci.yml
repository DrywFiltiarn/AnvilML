name: CI AnvilML v3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            fmt: true
            provision: bash scripts/install_worker_deps.sh
            python: worker/.venv/bin/python
          - os: windows-latest
            fmt: false
            provision: powershell -ExecutionPolicy Bypass -File scripts\install_worker_deps.ps1
            python: worker\.venv\Scripts\python
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Provision worker venv
        run: ${{ matrix.provision }}
      - name: Format check
        if: matrix.fmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --features mock-hardware -- -D warnings
      - name: Test
        run: cargo test --workspace --features mock-hardware

  worker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            provision: bash scripts/install_worker_deps.sh
            python: worker/.venv/bin/python
          - os: windows-latest
            provision: powershell -ExecutionPolicy Bypass -File scripts\install_worker_deps.ps1
            python: worker\.venv\Scripts\python
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Provision worker venv
        run: ${{ matrix.provision }}
      - name: Run worker tests
        env:
          ANVILML_WORKER_MOCK: "1"
        run: ${{ matrix.python }} -m pytest worker/tests -v

  openapi-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [rust]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Regenerate openapi.json
        run: cargo run -p anvilml-openapi
      - name: Check for drift
        run: git diff --exit-code api/openapi.json

  config-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [rust]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Config surface sync
        run: cargo test -p anvilml --features mock-hardware -- config_reference