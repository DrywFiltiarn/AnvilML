[package]
name = "anvilml-core"
version.workspace = true
edition = "2021"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "1"
uuid = { version = "1", features = ["serde", "v4"] }
url = { version = "2", features = ["serde"] }
utoipa = { version = "5", features = ["chrono", "uuid"] }
