[package]
name = "anvilml-worker"
version = "0.1.11"
edition = "2021"

[dependencies]
anvilml-core = { path = "../anvilml-core" }
anvilml-hardware = { path = "../anvilml-hardware" }
anvilml-ipc = { path = "../anvilml-ipc" }
rmp-serde = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
rmp-serde = { workspace = true }
serde_json = { workspace = true }
serial_test = "1"

[features]
mock-hardware = ["anvilml-hardware/mock-hardware"]
test-helpers = []
