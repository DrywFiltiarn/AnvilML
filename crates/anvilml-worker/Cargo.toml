[package]
name = "anvilml-worker"
version.workspace = true
edition.workspace = true

[dependencies]
anvilml-core = { path = "../anvilml-core" }
anvilml-hardware = { path = "../anvilml-hardware" }
anvilml-ipc = { path = "../anvilml-ipc" }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
