[package]
name = "anvilml-scheduler"
version = "0.1.18"
edition = "2021"

[dependencies]
anvilml-core = { path = "../anvilml-core" }
anvilml-ipc = { path = "../anvilml-ipc" }
anvilml-registry = { path = "../anvilml-registry" }
anvilml-worker = { path = "../anvilml-worker" }
async-trait = "0.1"
chrono = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
anvilml-worker = { path = "../anvilml-worker", features = ["test-helpers"] }

[features]
mock-hardware = ["anvilml-worker/mock-hardware"]
