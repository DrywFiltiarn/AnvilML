[package]
name = "anvilml-server"
version = "0.1.0"
edition = "2021"

[dependencies]
anvilml-core = { path = "../anvilml-core" }
anvilml-hardware = { path = "../anvilml-hardware" }
anvilml-ipc = { path = "../anvilml-ipc" }
anvilml-registry = { path = "../anvilml-registry" }
anvilml-scheduler = { path = "../anvilml-scheduler" }
anvilml-worker = { path = "../anvilml-worker" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
sqlx = { workspace = true, features = ["sqlite", "runtime-tokio"] }
sysinfo = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time"] }
tower = { workspace = true }
futures-util = { workspace = true }

[dev-dependencies]
chrono = { workspace = true }
tempfile = { workspace = true }
tokio-tungstenite = { workspace = true }
http-body-util = { workspace = true }
bytes = { workspace = true }

[features]
mock-hardware = ["anvilml-hardware/mock-hardware", "anvilml-worker/mock-hardware"]
