[package]
name = "anvilml-server"
version = "0.1.17"
edition = "2021"

[dependencies]
anvilml-core = { path = "../anvilml-core" }
anvilml-hardware = { path = "../anvilml-hardware" }
anvilml-ipc = { path = "../anvilml-ipc" }
anvilml-registry = { path = "../anvilml-registry" }
anvilml-scheduler = { path = "../anvilml-scheduler" }
anvilml-worker = { path = "../anvilml-worker", features = ["test-helpers"] }
async-trait = "0.1"
axum = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
futures-util = { workspace = true }
hex = { workspace = true }
http = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
url = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true, features = ["sqlite", "runtime-tokio"] }
sysinfo = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time", "fs"] }
tower = { workspace = true }
tower-http = { workspace = true, features = ["cors", "fs"] }
tracing = { workspace = true }
utoipa = { workspace = true }
uuid = { workspace = true, features = ["serde"] }

[dev-dependencies]
base64 = { workspace = true }
chrono = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
temp-env = { version = "0.3", features = ["async_closure"] }
tempfile = { workspace = true }
tokio-tungstenite = { workspace = true }
http-body-util = { workspace = true }
bytes = { workspace = true }

[features]
mock-hardware = ["anvilml-hardware/mock-hardware", "anvilml-worker/mock-hardware"]
