[package]
name = "anvilml-server"
version = "0.1.26"
edition.workspace = true

[dependencies]
anvilml-artifacts = { path = "../anvilml-artifacts" }
anvilml-core = { path = "../anvilml-core" }
anvilml-hardware = { path = "../anvilml-hardware" }
anvilml-ipc = { path = "../anvilml-ipc" }
anvilml-registry = { path = "../anvilml-registry" }
anvilml-scheduler = { path = "../anvilml-scheduler" }
anvilml-worker = { path = "../anvilml-worker" }
axum = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
sha2 = "0.10"
sqlx = { workspace = true }
serde_json = { workspace = true }
sysinfo = "0.33"
tokio = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
utoipa = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
anvilml-registry = { path = "../anvilml-registry" }
chrono = { workspace = true }
futures = "0.3"
serde_json = { workspace = true }
serial_test = "3.5"
tempfile = { workspace = true }
tokio = { workspace = true }
tower = { version = "0.5", features = ["util"] }

[features]
# Forward mock-hardware to anvilml-hardware so MockDetector is compiled in.
mock-hardware = ["anvilml-hardware/mock-hardware"]
