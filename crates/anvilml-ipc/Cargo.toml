[package]
name = "anvilml-ipc"
version = "0.1.0"
edition = "2021"
description = "Inter-process communication for AnvilML"

[dependencies]
serde = { version = "1", features = ["derive"] }
rmp-serde = "1"
uuid = { version = "1", features = ["serde"] }
serde_json = "1"
anvilml-core = { path = "../anvilml-core" }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "io-util"] }
