# anvilml.toml — Canonical config reference for AnvilML.
#
# This file is the config-drift reference: every field must appear at its
# documented default, enforced automatically by the `config_reference` test
# in `backend/tests/config_reference.rs`.
#
# Config precedence (lowest to highest): compiled-in defaults → this file →
# ANVILML_* environment variables → CLI flags.

host = "127.0.0.1"
port = 8488
db_path = "./anvilml.db"
artifact_dir = "./artifacts"
venv_path = "./worker/.venv"
model_scan_depth = 2
max_ipc_payload_mib = 256

[[model_dirs]]
# path = "./models"
# recursive = false

[gpu_selection]
default_device = "auto"

[limits]
max_queued_jobs = 100
